name: Install LVGL using CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-examples:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kconfig
        run: pip install kconfiglib

      - name: Build LVGL with Public API
        run: |
          defconfig configs/ci/install/public_api_config
          cmake -B build -GNinja
          cmake --build build
          cmake --install build --prefix lvgl-public-install

      - name: Build LVGL with Private API
        run: |
          defconfig configs/ci/install/private_api_config
          cmake -B build -GNinja
          cmake --build build
          cmake --install build --prefix lvgl-private-install

      - name: Generate Compilation Test Code
        run: |
          echo "#include <lvgl/lvgl.h> 
            #include <lvgl/lvgl.h> 
            #include <lvgl/demos/lv_demos.h> 
            #include <lvgl/examples/lv_examples.h> 
            int main(void) { 
              lv_init();
              lv_example_label_1();
              lv_demo_widgets();
              while(1) { 
                lv_timer_handler(); 
              } 
              return 0; 
          }" >> main_public.c

          echo "#include <lvgl/lvgl.h> 
            #include <lvgl/lvgl.h> 
            #include <lvgl/demos/lv_demos.h> 
            #include <lvgl/examples/lv_examples.h> 
            #include <lvgl_private/lvgl_private.h> 
            
            int main(void) { 
              lv_init();
              lv_example_label_1();
              lv_demo_widgets();
              lv_obj_destruct(lv_screen_active()); /*private*/
              while(1) { 
                lv_timer_handler(); 
              } 
              return 0; 
          }" >> main_private.c

      - name: Compile Test Code with Public API
        run: g++ main_public.c -o main -I$(pwd)/lvgl-install/include -L$(pwd)/lvgl-install/lib -llvgl_examples -llvgl_demos -llvgl -llvgl_thorvg -lm

      - name: Compile Test Code with Private API
        run: g++ main_private.c -o main -I$(pwd)/lvgl-install/include -L$(pwd)/lvgl-install/lib -llvgl_examples -llvgl_demos -llvgl -llvgl_thorvg -lm
